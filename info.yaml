name: support-desk
description: >
  Zendesk-style shared inbox on Ignite + K3. Tickets and messages live in the K3 SQL
  warehouse, full bodies and KB articles are objects, and a vector collection powers
  suggested answers. One action-routed Python function.
runtime: python
mcp_enabled: true

input:
  type: object
  required: [action]
  properties:
    action:
      type: string
      # PUBLIC (anon-safe): submit_ticket, ticket_status, search_kb
      # PUBLIC identity (lib/identity.py): auth_config, request_code, verify_code,
      #   whoami — plus my_tickets / reply_ticket, which require a signed-in session
      # PRIVATE, staff level (admin key OR any staff identity): create_ticket,
      #   add_message, triage, suggest_reply, add_kb/list_kb/get_kb, get_ticket,
      #   list_tickets, set_status, assign, rate, stats, export_tickets,
      #   list_agents, list_rules
      # PRIVATE, admin-only (ADMIN_ONLY_ACTIONS in lib/gate.py): add_agent,
      #   update_agent, remove_agent, upsert_rule, delete_rule, remove_kb,
      #   create_key, list_keys, revoke_key
      enum: [submit_ticket, ticket_status, search_kb,
             auth_config, request_code, verify_code, whoami, my_tickets, reply_ticket,
             create_ticket, add_message, triage, suggest_reply,
             add_kb, list_kb, get_kb, remove_kb,
             get_ticket, list_tickets, set_status, assign, rate, stats, export_tickets,
             list_agents, add_agent, update_agent, remove_agent,
             list_rules, upsert_rule, delete_rule,
             create_key, list_keys, revoke_key]
    key:
      type: string
      description: >
        API key in the request body. A project (public) key authorizes PUBLIC
        actions; an admin key authorizes PRIVATE actions. Omit when the app's key
        tiers are unconfigured (open).
    session:
      type: string
      description: >
        Identity credential (AUTH_MODE adapters, lib/identity.py): the signed
        session from verify_code (email mode) or the IdP access token (oidc
        mode). The portal server injects it from an HttpOnly cookie.
    email: { type: string }
    code: { type: string }
    subject: { type: string }
    body: { type: string }
    requester_email: { type: string }
    channel: { type: string }
    ticket_id: { type: string }
    query: { type: string }
    status:
      type: string
      # Ticket lifecycle enum — mirrors STATUSES in handler.py; set_status and
      # the list_tickets filter reject anything else.
      enum: [new, open, pending, solved]
    assignee: { type: string }

output:
  type: object
  properties:
    ok: { type: boolean }
    action: { type: string }
    result: { type: object }

env:
  - DODIL_SA_ID
  - DODIL_SA_SECRET
  # Which tier this deployment serves (lib/gate.py). The realistic layout is two
  # apps over this one codebase: public (customer backend — PUBLIC actions only)
  # and admin (agent backend — everything, fail-closed unless ADMIN_KEYS is set).
  # Default "all" = combined single-app dev deploy.
  - APP_ROLE        # public | admin | all
  # Public/private gate (see lib/gate.py). Comma-separated. If a tier has no key
  # configured (env + api_keys table both empty), that tier is open — EXCEPT the
  # private tier under APP_ROLE=admin, which refuses to run without ADMIN_KEYS.
  - ADMIN_KEYS      # authorizes PRIVATE actions (agent inbox, admin, key mgmt)
  - PUBLIC_KEYS     # authorizes PUBLIC actions (submit_ticket, ticket_status, search_kb)
  # Identity seam (lib/identity.py) — plug in ANY auth system, or none:
  - AUTH_MODE       # none (default) | email | oidc | header
  - SESSION_SECRET  # email mode: HMAC key for codes + sessions (required)
  - SEND_MODE       # email mode: test (log codes; demo_code in response) | webhook
  - MAIL_WEBHOOK_URL # email mode + SEND_MODE=webhook: POST {to,subject,text} here
  - OIDC_ISSUER     # oidc mode: issuer URL; tokens validated via its userinfo endpoint
  - PROXY_SECRET    # header mode: shared secret the auth proxy asserts identities with
  - AGENT_EMAILS    # bootstrap admins (comma-separated emails) — real staff live in the agents table
  - AGENT_DOMAINS   # bootstrap admin domains (comma-separated)
  # Routing engine (actions/routing.py):
  - ROUTING         # rules (default) | ai (model picks within rule pools) | off

test_input:
  action: create_ticket
  subject: "Charged twice for order #8891"
  body: "I was billed $129 twice this morning. Please refund the duplicate."
  requester_email: "sam@acme.io"
  channel: email
